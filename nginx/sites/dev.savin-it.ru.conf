server {
    listen 80;
    server_name dev.savin-it.ru;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name dev.savin-it.ru;
    
    ssl_certificate /etc/letsencrypt/live/dev.savin-it.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.savin-it.ru/privkey.pem;
    
    root /var/www/react-tables;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://sheets-backend:8000;
    }
    
    location /health {
        proxy_pass http://sheets-backend:8000/health;
    }
    
    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
} 