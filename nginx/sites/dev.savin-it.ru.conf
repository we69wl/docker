server {
    listen 80;
    listen [::]:80;
    server_name dev.savin-it.ru;

    root /var/www/dev-react-tables;
    index index.html;

    access_log /var/log/nginx/dev.savin-it.ru.access.log;
    error_log /var/log/nginx/dev.savin-it.ru.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://python:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}