server {
    listen 80;  # → 8080
    server_name dev.savin-it.ru localhost;
    
    # React SPA на /react-tables/
    location /react-tables/ {
        alias /var/www/react-tables/;
        index index.html;
        try_files $uri $uri/ /react-tables/index.html;
    }
    
    location /react-tables/api/ {
        proxy_pass http://sheets-backend:8000/;  # ← СЛЕШ здесь!
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
    }

    location /health {
        proxy_pass http://sheets-backend:8000/health;
    }
    
    # Главная → React
    location = / {
        return 301 /react-tables/;
    }
}

server {
    listen 443 ssl;  # → 8443
    server_name dev.savin-it.ru;
    
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    
    location /api/ {
        proxy_pass http://sheets-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /react-tables/ {
        alias /var/www/react-tables/;
        try_files $uri $uri/ /react-tables/index.html;
    }
    
    location /react-tables/api/ {
        proxy_pass http://sheets-backend:8000/;
    }
    
    location /health {
        proxy_pass http://sheets-backend:8000/health;
    }
    
    location = / {
        return 301 /react-tables/;
    }
}