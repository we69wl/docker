server {
    listen 80;
    listen [::]:80;
    server_name dev.savin-it.ru;

    access_log /var/log/nginx/dev.savin-it.ru.access.log;
    error_log /var/log/nginx/dev.savin-it.ru.error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /react-tables/ {
        alias /var/www/react-tables/;
        index index.html;
        try_files $uri $uri/ /react-tables/index.html;
    }

    location /react-tables/api/ {
        proxy_pass http://python:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin $http_origin;
    }

    location /health {
        proxy_pass http://python:8000/health;
    }

    location = / {
        return 301 /react-tables/;
    }
}