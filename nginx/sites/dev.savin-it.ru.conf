server {
    listen 80;
    listen [::]:80;
    server_name dev.savin-it.ru localhost;
    
    root /var/www/react-tables;
    index index.html index.htm;
    
    # ✅ Фикс SPA routing — точный match
    location / {
        try_files $uri $uri/ @react;  # named location
    }
    
    # API
    location /api/ {
        proxy_pass http://sheets-backend:8000;
    }
    
    # Health
    location /health {
        proxy_pass http://sheets-backend:8000/health;
    }
    
    # SPA fallback
    location @react {
        try_files /index.html =404;
    }
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}