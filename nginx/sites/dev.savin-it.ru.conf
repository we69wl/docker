server {
    listen 80;
    listen [::]:80;
    server_name dev.savin-it.ru localhost;
    
    root /var/www/react-tables;
    index index.html;
    
    # API (БЕЗ слеша в конце!)
    location /api/ {
        proxy_pass http://sheets-backend:8000;
        proxy_set_header Host $host;
    }
    
    # Health
    location /health {
        proxy_pass http://sheets-backend:8000/health;
    }
    
    # React SPA - ПРОСТОЙ И РАБОЧИЙ
    location / {
        try_files $uri $uri/ /index.html;
    }
}