proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name dev6.savin-it.ru dev.savin-it.ru;

    # Certbot
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot;
        access_log off;
        try_files $uri =404;
    }

    # React SPA на HTTP тоже
    location /react-tables/ {
        alias /var/www/react-tables/;
        index index.html;
        try_files $uri $uri/ /react-tables/index.html;
    }

    # Остальное на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev6.savin-it.ru dev.savin-it.ru;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    gzip on;
    gzip_types application/json text/css text/javascript text/xml application/xml;

    # React SPA
    location /react-tables/ {
        alias /var/www/react-tables/;
        index index.html;
        try_files $uri $uri/ /react-tables/index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API с кэшем
    location /api/ {
        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_pass http://python:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health без кэша
    location /health {
        proxy_pass http://python:8000/health;
        proxy_set_header Host $host;
    }

    # Root redirect
    location = / {
        return 301 /react-tables/;
    }
}