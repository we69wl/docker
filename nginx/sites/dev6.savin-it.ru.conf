proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

# HTTP → ACME + HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dev6.savin-it.ru dev.savin-it.ru;

    # Let's Encrypt ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        access_log off;
    }

    # React SPA fallback
    location /react-tables/ {
        alias /var/www/react-tables/;
        index index.html;
        try_files $uri $uri/ /react-tables/index.html;
    }

    # HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Production
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev6.savin-it.ru dev.savin-it.ru;

    # Let's Encrypt certs
    ssl_certificate /etc/letsencrypt/live/dev6.savin-it.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev6.savin-it.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    # Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://sheets.googleapis.com;" always;
    add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://sheets.googleapis.com https://dev.savin-it.ru;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Gzip
    gzip on;
    gzip_types application/json text/css text/javascript text/xml application/xml;

    # React SPA (1 год cache)
    location /react-tables/ {
        alias /var/www/react-tables/;
        index index.html;

        # Хэшированные ассеты (main.abc123.js) — кэш навсегда
        location ~* \.(js|css|png|jpg|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html — никогда не кэшировать
        location = /react-tables/index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        try_files $uri $uri/ /react-tables/index.html;
    }

    # API proxy + cache (1GB, 1h TTL)
    location /api/ {
        # CORS для rufago.ru
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://rufago.ru' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' 'https://rufago.ru' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;

        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://python:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck (no cache)
    location /health {
        proxy_pass http://python:8000/health;
        proxy_set_header Host $host;
    }

    # Root → SPA
    location = / {
        return 301 /react-tables/;
    }
}