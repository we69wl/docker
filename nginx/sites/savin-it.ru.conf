server {
    listen 80;
    server_name savin-it.ru;

    root /var/www/savin-it.ru;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://python:8000/api/;
        proxy_set_header Host $host;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}