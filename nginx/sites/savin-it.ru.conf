server {
    listen 80;
    listen [::]:80;
    server_name savin-it.ru www.savin-it.ru;

    # Корневая папка (монтируется из nginx/www/savin-it.ru)
    root /var/www/savin-it.ru;
    index index.html index.htm;

    access_log /var/log/nginx/savin-it.ru.access.log;
    error_log /var/log/nginx/savin-it.ru.error.log;

    # Статика
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP (если нужен)
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # API прокси (если нужно)
    location /api/ {
        proxy_pass http://python:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}